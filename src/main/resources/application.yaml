fint:
  application-id: fint-flyt-vigo-gateway
  cache:
    defaultCacheEntryTimeToLiveMillis: 518400000
    defaultCacheHeapSize: 1000000
  flyt:
    sourceapplication:
      retentionTimeInDays: 30
logging:
  level:
    no.novari.cache.ehcache.FintEhCacheEventLogger: WARN
server:
  error:
    include-message: always
  max-http-request-header-size: 40KB
spring:
  http:
    codecs:
      max-in-memory-size: 500MB
  profiles:
    include:
      - flyt-kafka
      - flyt-logging
      - flyt-resource-server
      - flyt-file-client
