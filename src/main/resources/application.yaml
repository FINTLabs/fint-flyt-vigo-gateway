fint:
  application-id: fint-flyt-vigo-gateway

novari:
  flyt:
    web-instance-gateway:
      max-request-size: 500MB

logging:
  level:
    no.novari.cache.ehcache.FintEhCacheEventLogger: WARN

server:
  error:
    include-message: always
  max-http-request-header-size: 40KB

spring:
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  profiles:
    include:
      - flyt-kafka
      - flyt-logging
      - flyt-web-resource-server
      - flyt-file-client
