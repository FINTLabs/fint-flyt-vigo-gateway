apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: telemarkfylke-no

resources:
  - ../../../base

labels:
  - pairs:
      app.kubernetes.io/instance: fint-flyt-vigo-gateway_telemarkfylke_no
      fintlabs.no/org-id: telemarkfylke.no

patches:
  - patch: |-
      - op: replace
        path: "/spec/kafka/acls/0/topic"
        value: "telemarkfylke-no.flyt.*"
      - op: replace
        path: "/spec/orgId"
        value: "telemarkfylke.no"
      - op: replace
        path: "/spec/ingress/basePath"
        value: "/telemarkfylke-no/api/vigo"
      - op: add
        path: "/spec/env/-"
        value:
          name: "server.servlet.context-path"
          value: "/telemarkfylke-no"
      - op: add
        path: "/spec/env/-"
        value:
          name: "logging.level.no.novari.instance.gateway"
          value: "INFO"
      - op: replace
        path: "/spec/probes/readiness/path"
        value: "/telemarkfylke-no/actuator/health/readiness"
      - op: replace
        path: "/spec/probes/liveness/path"
        value: "/telemarkfylke-no/actuator/health/liveness"
      - op: replace
        path: "/spec/observability/metrics/path"
        value: "/telemarkfylke-no/actuator/prometheus"
      - op: add
        path: "/spec/env/-"
        value:
          name: novari.kafka.topic.org-id
          value: "telemarkfylke-no"
    target:
      kind: Application
      name: fint-flyt-vigo-gateway
